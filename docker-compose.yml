services:
  kakaotalk:
    build:
      context: .
      args:
        INSTALL_FIREFOX: ${INSTALL_FIREFOX:-true}
    image: kakaotalk-wine:local
    container_name: kakaotalk-wine
    shm_size: "1gb"
    ports:
      - "14500:14500"
    volumes:
      - kakao-wine-data:/data
      - ${KAKAO_SHARE_DIR:-/mnt/c/Users/$USER/Desktop/kakao-share}:/share
    restart: unless-stopped
    environment:
      WINEPREFIX: /data/wineprefix
      LANG: ko_KR.UTF-8
      LC_ALL: ko_KR.UTF-8
      ENABLE_FIREFOX: ${ENABLE_FIREFOX:-true}

volumes:
  kakao-wine-data:
